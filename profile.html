<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Fluenci</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const app = initializeApp({
      apiKey: "AIzaSyB-S6RLgAtFTiI1REjQSpyy4LbnILUtlAU",
      authDomain: "fluenci-auth.firebaseapp.com",
      projectId: "fluenci-auth",
      storageBucket: "fluenci-auth.firebasestorage.app",
      messagingSenderId: "669848372966",
      appId: "1:669848372966:web:2c32aa88fcbe9e10cd1d27"
    });
    const auth = getAuth(app);
    const db = getFirestore(app);

    function set(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = '/'; return; }
      const snap = await getDoc(doc(db, 'users', user.uid));
      const d = snap.exists() ? snap.data() : {};
      const name    = d.name    || user.email.split('@')[0];
      const handle  = d.handle  || '';
      const bio     = d.bio     || '';
      const role    = d.role    || 'student';
      const initials = name.charAt(0).toUpperCase();
      set('profileDisplayName', name);
      set('profileDisplayHandle', handle ? '@' + handle : '');
      set('profileDisplayBio', bio);
      set('profileAvatarCircle', initials);
      set('editModalAvatar', initials);
      set('profileFollowing', d.following || 0);
      set('profileFollowers', d.followers || 0);
      if (role === 'admin') document.getElementById('adminAccessBtn2').style.display = 'block';
      if (role === 'tutor') document.getElementById('tutorAccessBtn2').style.display = 'block';
      window._user = user;
      window._db = db;
      window._doc = doc;
      window._setDoc = setDoc;
      window._signOut = signOut;
      window._auth = auth;
      window._userData = { name, handle, bio, role };
    });
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --blue-primary: #1B1464; --blue-dark: #121044; --blue-light: #4B47D6;
      --orange: #FF7A50; --green: #00C896; --green-light: #E6FAF5;
      --gray-100: #F7F7F8; --gray-200: #EEEEF0; --gray-300: #D1D1D6;
      --gray-400: #A1A1AA; --gray-500: #71717A; --gray-600: #52525B; --gray-900: #18181B; --white: #FFFFFF;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .phone-frame { width: 375px; height: 812px; background: var(--white); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 50px 100px rgba(0,0,0,0.25), 0 0 0 12px #1a1a1a; }
    .status-bar { height: 44px; background: var(--white); display: flex; justify-content: space-between; align-items: center; padding: 0 24px; position: absolute; top: 0; left: 0; right: 0; z-index: 100; }
    .status-bar span { font-size: 14px; font-weight: 600; color: var(--gray-900); }
    .page { height: 100%; overflow-y: auto; padding-bottom: 90px; background: var(--gray-100); padding-top: 44px; }
    .nav-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 84px; background: var(--white); display: flex; justify-content: space-around; align-items: flex-start; padding-top: 10px; border-top: 1px solid var(--gray-200); }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 16px; }
    .nav-item:active { transform: scale(0.95); }
    .nav-icon { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
    .nav-icon svg { width: 24px; height: 24px; stroke: var(--gray-400); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .nav-item.active .nav-icon svg { stroke: var(--blue-primary); }
    .nav-label { font-size: 10px; font-weight: 500; color: var(--gray-400); }
    .nav-item.active .nav-label { color: var(--blue-primary); font-weight: 600; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-label { font-size: 13px; font-weight: 600; color: var(--gray-600); }
    .auth-input { width: 100%; padding: 14px 16px; font-size: 15px; font-family: 'Inter', sans-serif; border: 1px solid var(--gray-200); border-radius: 10px; outline: none; }
    .auth-input:focus { border-color: var(--blue-primary); box-shadow: 0 0 0 3px rgba(27,20,100,0.1); }
    .modal-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 200; }
    .modal-overlay.active { display: flex; }
    .modal-content { width: 100%; background: var(--white); border-radius: 20px 20px 0 0; padding: 24px; max-height: 85%; overflow-y: auto; }
    .modal-handle { width: 40px; height: 4px; background: var(--gray-300); border-radius: 2px; margin: 0 auto 20px; }
    .modal-title { font-size: 20px; font-weight: 700; color: var(--gray-900); margin-bottom: 16px; text-align: center; }
    .modal-btn { width: 100%; padding: 16px; font-size: 16px; font-weight: 600; background: var(--blue-primary); color: var(--white); border: none; border-radius: 10px; cursor: pointer; margin-bottom: 12px; font-family: 'Inter', sans-serif; }
    .modal-btn.secondary { background: var(--gray-100); color: var(--gray-600); }
    .toast { position: absolute; top: 60px; left: 16px; right: 16px; background: var(--gray-900); color: var(--white); padding: 16px; border-radius: 12px; font-size: 14px; font-weight: 500; z-index: 300; display: none; align-items: center; gap: 12px; }
    .toast.show { display: flex; }
    .toast.success { background: var(--green); }
    .toast.error { background: #EF4444; }
  </style>
</head>
<body>
<div class="phone-frame">
  <div class="status-bar"><span>9:41</span><span>📶🔋</span></div>
  <div class="toast" id="toast"><span id="toastIcon">✓</span><span id="toastMsg"></span></div>

  <div class="page">
    <!-- Profile Card -->
    <div style="background:var(--white); margin:0 0 12px; padding:24px 16px 20px;">
      <div style="display:flex; align-items:center; gap:16px; margin-bottom:16px;">
        <div id="profileAvatarCircle" style="width:72px; height:72px; border-radius:50%; background:linear-gradient(145deg,#1B1464,#4B47D6); display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:800; color:white; flex-shrink:0;">?</div>
        <div style="flex:1; min-width:0;">
          <div id="profileDisplayName" style="font-size:20px; font-weight:700; color:var(--gray-900); margin-bottom:2px;">—</div>
          <div id="profileDisplayHandle" style="font-size:14px; color:var(--gray-500); margin-bottom:4px;"></div>
          <div id="profileDisplayBio" style="font-size:13px; color:var(--gray-500);"></div>
        </div>
      </div>
      <div style="display:flex; gap:24px; margin-bottom:16px;">
        <div style="text-align:center;"><div id="profileFollowing" style="font-size:18px; font-weight:700; color:var(--gray-900);">0</div><div style="font-size:12px; color:var(--gray-500);">Following</div></div>
        <div style="text-align:center;"><div id="profileFollowers" style="font-size:18px; font-weight:700; color:var(--gray-900);">0</div><div style="font-size:12px; color:var(--gray-500);">Followers</div></div>
      </div>
      <button onclick="openEditProfile()" style="width:100%; padding:12px; background:var(--gray-100); border:none; border-radius:10px; font-size:15px; font-weight:600; color:var(--gray-900); cursor:pointer; font-family:'Inter',sans-serif;">Edit Profile</button>
    </div>

    <!-- Role buttons -->
    <div id="adminAccessBtn2" style="display:none; margin:0 0 4px; padding:14px 16px; background:var(--blue-primary); text-align:center; font-size:15px; font-weight:600; color:#fff; cursor:pointer;" onclick="window.location.href='/?screen=adminDashboard'">⚙️ Admin Dashboard</div>
    <div id="tutorAccessBtn2" style="display:none; margin:0 0 4px; padding:14px 16px; background:#059669; text-align:center; font-size:15px; font-weight:600; color:#fff; cursor:pointer;" onclick="window.location.href='/?screen=tutorDashboard'">🎓 Tutor Dashboard</div>

    <!-- Tutor -->
    <div style="background:var(--white); border-radius:12px; margin:0 0 12px; overflow:hidden;">
      <div style="padding:12px 16px; font-size:11px; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--gray-100);">Tutor</div>
      <div onclick="openTutorApply()" style="display:flex; justify-content:space-between; align-items:center; padding:16px; cursor:pointer;">
        <div style="display:flex; align-items:center; gap:12px;"><span style="font-size:20px;">🎓</span><span style="font-size:15px; font-weight:600; color:var(--blue-primary);">Apply to be a tutor</span></div>
        <span style="color:var(--gray-400); font-size:18px;">›</span>
      </div>
    </div>

    <!-- Account -->
    <div style="background:var(--white); border-radius:12px; margin:0 0 12px; overflow:hidden;">
      <div style="padding:12px 16px; font-size:11px; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--gray-100);">Account</div>
      <div onclick="openEditProfile()" style="display:flex; justify-content:space-between; align-items:center; padding:16px; cursor:pointer; border-bottom:1px solid var(--gray-100);">
        <div style="display:flex; align-items:center; gap:12px;"><span style="font-size:20px;">👤</span><span style="font-size:15px;">Edit profile</span></div>
        <span style="color:var(--gray-400); font-size:18px;">›</span>
      </div>
      <div onclick="showToast('Payment methods coming soon 💳')" style="display:flex; justify-content:space-between; align-items:center; padding:16px; cursor:pointer;">
        <div style="display:flex; align-items:center; gap:12px;"><span style="font-size:20px;">💳</span><span style="font-size:15px;">Payment methods</span></div>
        <span style="color:var(--gray-400); font-size:18px;">›</span>
      </div>
    </div>

    <!-- Support -->
    <div style="background:var(--white); border-radius:12px; margin:0 0 12px; overflow:hidden;">
      <div style="padding:12px 16px; font-size:11px; font-weight:700; color:var(--gray-400); text-transform:uppercase; letter-spacing:0.5px; border-bottom:1px solid var(--gray-100);">Support</div>
      <div onclick="showToast('Help center coming soon ❓')" style="display:flex; justify-content:space-between; align-items:center; padding:16px; cursor:pointer; border-bottom:1px solid var(--gray-100);">
        <div style="display:flex; align-items:center; gap:12px;"><span style="font-size:20px;">❓</span><span style="font-size:15px;">Help center</span></div>
        <span style="color:var(--gray-400); font-size:18px;">›</span>
      </div>
      <div onclick="window.location.href='mailto:Hello@Fluenci.com'" style="display:flex; justify-content:space-between; align-items:center; padding:16px; cursor:pointer;">
        <div style="display:flex; align-items:center; gap:12px;"><span style="font-size:20px;">💬</span><span style="font-size:15px;">Contact us</span></div>
        <span style="color:var(--gray-400); font-size:18px;">›</span>
      </div>
    </div>

    <div onclick="doLogout()" style="margin:0 0 12px; padding:16px; background:var(--white); border-radius:12px; text-align:center; font-size:15px; font-weight:600; color:#EF4444; cursor:pointer;">Log out</div>
  </div>

  <!-- Edit Profile Modal -->
  <div class="modal-overlay" id="editProfileModal" onclick="if(event.target===this)closeEditProfile()">
    <div class="modal-content">
      <div class="modal-handle"></div>
      <h2 class="modal-title">Edit Profile</h2>
      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:20px;">
        <div id="editModalAvatar" style="width:72px;height:72px;border-radius:50%;background:linear-gradient(145deg,#1B1464,#4B47D6);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;color:white;margin-bottom:10px;">?</div>
      </div>
      <div class="input-group" style="margin-bottom:14px;"><label class="input-label">Full name</label><input type="text" class="auth-input" id="editName" placeholder="Your name"></div>
      <div class="input-group" style="margin-bottom:14px;"><label class="input-label">Username</label><input type="text" class="auth-input" id="editHandle" placeholder="username"></div>
      <div class="input-group" style="margin-bottom:20px;"><label class="input-label">Bio</label><textarea class="auth-input" id="editBio" rows="2" placeholder="Tell people about yourself..." style="resize:none;"></textarea></div>
      <button class="modal-btn" onclick="saveProfile()">Save changes</button>
      <button class="modal-btn secondary" onclick="closeEditProfile()">Cancel</button>
    </div>
  </div>

  <!-- Tutor Apply Modal -->
  <div class="modal-overlay" id="tutorApplyModal" onclick="if(event.target===this)closeTutorApply()">
    <div class="modal-content">
      <div class="modal-handle"></div>
      <h2 class="modal-title">Apply to be a tutor 🎓</h2>
      <div class="input-group" style="margin-bottom:14px;"><label class="input-label">Language you teach</label>
        <select class="auth-input" id="applyLanguage"><option>🇪🇸 Spanish</option><option>🇫🇷 French</option><option>🇩🇪 German</option><option>🇯🇵 Japanese</option><option>🇰🇷 Korean</option><option>🇵🇹 Portuguese</option><option>Other</option></select>
      </div>
      <div class="input-group" style="margin-bottom:14px;"><label class="input-label">Years of experience</label>
        <select class="auth-input" id="applyExperience"><option>Less than 1 year</option><option>1–2 years</option><option>3–5 years</option><option>5+ years</option></select>
      </div>
      <div class="input-group" style="margin-bottom:14px;"><label class="input-label">Hourly rate (USD)</label><input type="number" class="auth-input" id="applyRate" placeholder="e.g. 25"></div>
      <div class="input-group" style="margin-bottom:20px;"><label class="input-label">Short bio</label><textarea class="auth-input" id="applyBio" rows="3" placeholder="Tell students about yourself..." style="resize:none;"></textarea></div>
      <div id="applyError" style="color:#DC2626;font-size:13px;margin-bottom:12px;display:none;"></div>
      <button class="modal-btn" onclick="submitTutorApp()">Submit application</button>
      <button class="modal-btn secondary" onclick="closeTutorApply()">Cancel</button>
    </div>
  </div>

  <!-- Nav Bar -->
  <div class="nav-bar">
    <div class="nav-item" onclick="window.location.href='/'">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></div>
      <span class="nav-label">Home</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/?screen=rooms'">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><path d="M2 12c0 0 1-4 3-4s3 8 5 8 3-8 5-8 3 4 3 4"/></svg></div>
      <span class="nav-label">Rooms</span>
    </div>
    <div class="nav-item" onclick="window.location.href='/?screen=lessons'">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
      <span class="nav-label">Lessons</span>
    </div>
    <div class="nav-item active">
      <div class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></div>
      <span class="nav-label">Profile</span>
    </div>
  </div>
</div>

<script>
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    document.getElementById('toastIcon').textContent = (type === 'error') ? '✕' : '✓';
    t.className = 'toast show ' + (type || 'success');
    setTimeout(() => t.classList.remove('show'), 2500);
  }
  function openEditProfile() {
    const d = window._userData || {};
    document.getElementById('editName').value = d.name || '';
    document.getElementById('editHandle').value = d.handle || '';
    document.getElementById('editBio').value = d.bio || '';
    document.getElementById('editProfileModal').classList.add('active');
  }
  function closeEditProfile() { document.getElementById('editProfileModal').classList.remove('active'); }
  async function saveProfile() {
    const name   = document.getElementById('editName').value.trim();
    const handle = document.getElementById('editHandle').value.replace('@','').trim().toLowerCase().replace(/\s+/g,'_');
    const bio    = document.getElementById('editBio').value.trim();
    if (!name) { showToast('Name cannot be empty', 'error'); return; }
    try {
      await window._setDoc(window._doc(window._db, 'users', window._user.uid), { name, handle, bio }, { merge: true });
      document.getElementById('profileDisplayName').textContent = name;
      document.getElementById('profileDisplayHandle').textContent = handle ? '@' + handle : '';
      document.getElementById('profileDisplayBio').textContent = bio;
      document.getElementById('profileAvatarCircle').textContent = name.charAt(0).toUpperCase();
      document.getElementById('editModalAvatar').textContent = name.charAt(0).toUpperCase();
      window._userData = { ...window._userData, name, handle, bio };
      closeEditProfile();
      showToast('Profile updated! ✅');
    } catch(e) { showToast('Error: ' + e.message, 'error'); }
  }
  function openTutorApply() { document.getElementById('tutorApplyModal').classList.add('active'); }
  function closeTutorApply() { document.getElementById('tutorApplyModal').classList.remove('active'); }
  async function submitTutorApp() {
    const rate = document.getElementById('applyRate').value.trim();
    const bio  = document.getElementById('applyBio').value.trim();
    const errEl = document.getElementById('applyError');
    if (!rate || !bio) { errEl.textContent = 'Please fill in rate and bio.'; errEl.style.display = 'block'; return; }
    errEl.style.display = 'none';
    try {
      await window._setDoc(window._doc(window._db, 'users', window._user.uid), {
        role: 'tutor_pending',
        tutorApplication: { language: document.getElementById('applyLanguage').value, experience: document.getElementById('applyExperience').value, rate, bio }
      }, { merge: true });
      closeTutorApply();
      showToast('Application submitted! 🎓');
    } catch(e) { errEl.textContent = 'Error: ' + e.message; errEl.style.display = 'block'; }
  }
  async function doLogout() {
    await window._signOut(window._auth);
    window.location.href = '/';
  }
</script>
</body>
</html>
