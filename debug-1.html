<!DOCTYPE html>
<html>
<head>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyB-S6RLgAtFTiI1REjQSpyy4LbnILUtlAU",
    authDomain: "fluenci-auth.firebaseapp.com",
    projectId: "fluenci-auth",
    storageBucket: "fluenci-auth.firebasestorage.app",
    messagingSenderId: "669848372966",
    appId: "1:669848372966:web:2c32aa88fcbe9e10cd1d27"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);

  function log(msg, color) {
    const p = document.createElement('p');
    p.style.color = color || 'black';
    p.textContent = msg;
    document.getElementById('log').appendChild(p);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) { log('❌ Not logged in', 'red'); return; }
    log('✅ User: ' + user.email, 'green');
    
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) { log('❌ No Firestore doc', 'red'); return; }
    
    const d = snap.data();
    log('✅ Firestore data:', 'green');
    log('  name: ' + d.name);
    log('  handle: ' + d.handle);
    log('  role: ' + d.role);
    log('  profileSetup: ' + d.profileSetup);
    
    // Now simulate what updateProfileInfo does
    log('--- Testing element IDs ---', 'blue');
    const ids = ['profileDisplayName','profileDisplayHandle','profileDisplayBio','profileAvatarCircle','profileFollowing','profileFollowers'];
    ids.forEach(id => {
      const el = document.getElementById(id);
      log('  ' + id + ': ' + (el ? '✅ EXISTS' : '❌ MISSING'), el ? 'green' : 'red');
    });
    
    // Try setting them
    log('--- Setting values ---', 'blue');
    const dn = document.getElementById('profileDisplayName');
    if (dn) { dn.textContent = d.name; log('  Set profileDisplayName to: ' + d.name, 'green'); }
    
    log('--- sessionStorage ---', 'blue');
    log('  fluenci_user: ' + sessionStorage.getItem('fluenci_user'));
  });
</script>
</head>
<body style="font-family:monospace; padding:20px;">
<h2>Fluenci Debug v2</h2>
<div id="log"><p>Loading...</p></div>

<!-- Simulate the profile elements -->
<hr>
<h3>Profile Elements Test:</h3>
<div id="profileDisplayName">DEFAULT</div>
<div id="profileDisplayHandle">DEFAULT</div>
<div id="profileDisplayBio">DEFAULT</div>
<div id="profileAvatarCircle">?</div>
<div id="profileFollowing">0</div>
<div id="profileFollowers">0</div>
</body>
</html>
