<!DOCTYPE html>
<html>
<head>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({
    apiKey: "AIzaSyB-S6RLgAtFTiI1REjQSpyy4LbnILUtlAU",
    authDomain: "fluenci-auth.firebaseapp.com",
    projectId: "fluenci-auth",
    storageBucket: "fluenci-auth.firebasestorage.app",
    messagingSenderId: "669848372966",
    appId: "1:669848372966:web:2c32aa88fcbe9e10cd1d27"
  });
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    const log = document.getElementById('log');
    if (user) {
      log.innerHTML += `<p>✅ Logged in as: ${user.email}</p>`;
      try {
        const snap = await getDoc(doc(db, 'users', user.uid));
        if (snap.exists()) {
          const d = snap.data();
          log.innerHTML += `<p>✅ Firestore doc found</p>`;
          log.innerHTML += `<p>name: ${d.name}</p>`;
          log.innerHTML += `<p>handle: ${d.handle}</p>`;
          log.innerHTML += `<p>role: ${d.role}</p>`;
          log.innerHTML += `<p>profileSetup: ${d.profileSetup}</p>`;
          // Now try calling window function
          log.innerHTML += `<p>window.showScreen exists: ${typeof window.showScreen}</p>`;
          log.innerHTML += `<p>window.updateProfileInfo exists: ${typeof window.updateProfileInfo}</p>`;
        } else {
          log.innerHTML += `<p>❌ No Firestore doc found for uid: ${user.uid}</p>`;
        }
      } catch(e) {
        log.innerHTML += `<p>❌ Firestore error: ${e.message}</p>`;
      }
    } else {
      log.innerHTML += `<p>❌ Not logged in</p>`;
    }
  });
</script>
</head>
<body>
<h2>Fluenci Debug Test</h2>
<div id="log"><p>Loading...</p></div>
<script>
  window.showScreen = function(s) { document.getElementById('log').innerHTML += '<p>showScreen called: ' + s + '</p>'; }
  window.updateProfileInfo = function() { document.getElementById('log').innerHTML += '<p>updateProfileInfo called</p>'; }
</script>
</body>
</html>
